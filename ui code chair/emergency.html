<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Care | Emergency Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f7f6; height: 100vh; }
        
        /* Sidebar Navigation */
        .sidebar { width: 250px; background-color: #2c3e50; color: white; padding: 20px; }
        .sidebar h2 { color: #1abc9c; margin-bottom: 30px; text-align: center; }
        .sidebar ul { list-style: none; }
        .sidebar ul li { padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .sidebar ul li:hover, .sidebar ul li.active { background-color: #34495e; color: #1abc9c; }
        .sidebar a { text-decoration: none; color: inherit; display: block; }

        /* Main Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .settings-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .settings-card h3 { color: #e74c3c; margin-bottom: 20px; border-bottom: 2px solid #f2f2f2; padding-bottom: 10px; }

        /* Form Elements */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #34495e; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; 
        }

        .toggle-group { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; }
        
        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        input:checked + .slider { background-color: #1abc9c; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(21px); }

        .save-btn { 
            background-color: #1abc9c; color: white; border: none; padding: 15px 30px; 
            border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%;
        }
        .save-btn:hover { background-color: #16a085; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>AI Care</h2>
        <ul>
            <li><a href="home.html">Dashboard</a></li>
            <li><a href="patient-info.html">Patient Info</a></li>
            <li><a href="navigation-logs.html">Navigation Logs</a></li>
            <li class="active"><a href="emergency.html">Emergency Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <header>
            <h1>Emergency Configuration</h1>
            <p>Setup automated triggers and emergency contact protocols.</p>
        </header>

        <div class="settings-grid">
            <div class="settings-card">


                <h1> Patient Name</h1>
                <h2> Heramb Padhye </h2>
                <div class="form-group">
                
                    <label>Mobile  Contact </label>
                    <input type="tel" value="+91 7066617127" placeholder="+1...">
                </div>
                <h3>Contact Protocol</h3>
                <div class="form-group">
                    <label>Emergency Contact 1 (SMS)</label>
                    <input type="tel" value="+91 9373092004" placeholder="+1...">
                </div>
                <div class="form-group">
                    <label>Emergency Contact 2 (Call)</label>
                    <input type="tel" value="+91 95613196163" placeholder="+1...">
                </div>
                <div class="form-group">
                    <label>Nearby Hospital Registry</label>
                    <select>
                        <option>Lokmanya Hospital - S B Road</option>
                        <option>MMF Ratna Memorial Hospital</option>
                        <option>Sancheti Hospital</option>
                    </select>
                </div>
            </div>

            <div class="settings-card">
                <h3>AI Trigger Thresholds</h3>
                <div class="toggle-group">
                    <span>Fall Detection (Accelerometer)</span>
                    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
                <div class="toggle-group">
                    <span>Abnormal Heart Rate Alert</span>
                    <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
                </div>
                <div class="form-group">
                    <label>BPM Warning Level (High)</label>
                    <input type="number" value="120">
                </div>
                <div class="form-group">
                    <label>BP Warning Level (High)</label>
                    <input type="number" value="100">
                </div>
                <div class="form-group">
                    <label>SpO2 Critical Level (Low %)</label>
                    <input type="number" value="90">
                </div>
                <div class="form-group">
                    <label>BGH Warning Level (High mg/dL)</label>
                    <input type="number" value="120">
                </div>
                <div class="form-group">
                    <label>BGH Warning Level (Low mg/dL)</label>
                    <input type="number" value="80">
                </div>
            </div>
        </div>

        <button class="save-btn" onclick="alert('Settings Saved Successfully!')">Update Emergency Protocols</button>
    </div>

</body>
</html>
